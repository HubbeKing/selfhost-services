apiVersion: k8s.mariadb.com/v1alpha1
kind: User
metadata:
  name: authelia
  namespace: database
spec:
  mariaDbRef:
    name: mariadb
  passwordSecretKeyRef:
    name: mariadb-authelia
    key: password
  maxUserConnections: 20
  host: "%"
  cleanupPolicy: Delete
