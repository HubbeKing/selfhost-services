apiVersion: v1
kind: Service
metadata:
  name: music-assistant
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.1.9
  externalTrafficPolicy: Local
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  ports:
    - port: 8095
      name: http
      protocol: TCP
  selector:
    app: music-assistant
