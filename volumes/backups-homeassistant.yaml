apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-backups-homeassistant
spec:
  accessModes: [ "ReadWriteMany" ]
  capacity:
    storage: 100G
  nfs:
    server: "192.168.1.121"
    path: "/mnt/array/Backups/home-assistant"
    readOnly: false
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-backups-homeassistant
spec:
  accessModes: [ "ReadWriteMany" ]
  resources:
    requests:
      storage: 100G
  storageClassName: ""
  volumeName: nfs-backups-homeassistant
